# Release Workflow
#
# Triggered by: git push of a version tag (e.g. v0.1.0)
#
# Builds signed installers for:
#   - macOS (Apple Silicon): .app + .dmg
#   - macOS (Intel):         .app + .dmg
#   - Windows (x64):         .exe (NSIS) + .msi (WiX)
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#
#   macOS signing (optional — skip for unsigned builds):
#     APPLE_CERTIFICATE          Base64-encoded .p12 certificate
#     APPLE_CERTIFICATE_PASSWORD Password for the .p12 file
#     APPLE_SIGNING_IDENTITY     "Developer ID Application: Name (TEAMID)"
#     APPLE_ID                   Apple ID email (for notarization)
#     APPLE_PASSWORD             App-specific password (for notarization)
#     APPLE_TEAM_ID              10-character Apple Team ID
#
#   Windows signing (optional — skip for unsigned builds):
#     WINDOWS_CERTIFICATE        Base64-encoded .pfx certificate
#     WINDOWS_CERTIFICATE_PASSWORD Password for the .pfx file

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v0.1.0, v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*' # e.g. v1.0.0-beta.1

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    permissions:
      contents: write   # Required to upload release assets

    strategy:
      fail-fast: false
      matrix:
        include:
          # ─── macOS: Apple Silicon (M-series) ──────────────────────────────
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

          # ─── macOS: Intel ─────────────────────────────────────────────────
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64

          # ─── Windows: x64 ─────────────────────────────────────────────────
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Linux: system dependencies (not used here, kept for reference) ──────
      # - name: Install Linux dependencies
      #   if: matrix.platform == 'ubuntu-22.04'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ── macOS: Import signing certificate ───────────────────────────────────
      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f certificate.p12

      # ── Windows: Import signing certificate ─────────────────────────────────
      - name: Import Windows signing certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

      # ── Install npm dependencies ─────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (only active when secrets exist)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows signing (only active when secrets exist)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.WINDOWS_CERTIFICATE }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Customer Management ${{ github.ref_name }}'
          releaseBody: |
            ## What's New
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Downloads
            | Platform | File | Notes |
            |---|---|---|
            | macOS (Apple Silicon) | `*_aarch64.dmg` | For M1/M2/M3 Macs |
            | macOS (Intel) | `*_x64.dmg` | For Intel Macs |
            | Windows | `*_x64-setup.exe` | Recommended installer |
            | Windows | `*_x64_en-US.msi` | MSI package |
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target ${{ matrix.target }}
